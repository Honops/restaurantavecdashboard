<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Restaurant</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- =============================================
     HEADER
============================================= -->
<header class="dashboard-header">

  <div class="header-left">
    <span class="header-logo">🍽️</span>
    <div class="header-title">
      <h1>Dashboard</h1>
      <p>Gestion des menus</p>
    </div>
  </div>

  <div class="header-center">
    <div id="todayEventWidget"></div>
  </div>

  <div class="header-right">

    <div class="dashboard-nav-tabs">
      <button class="dash-nav-btn dash-nav-active" id="navMenus">
        🍽️ Menus
      </button>
      <button class="dash-nav-btn" id="navReservations">
        📋 Réservations
        <span class="res-pending-badge" id="resPendingBadge" style="display:none;"></span>
      </button>
    </div>

    <span class="header-admin" id="adminEmail"></span>
    <button id="logoutBtn" class="btn-logout">Déconnexion</button>

  </div>

</header>


<!-- =============================================
     STATISTIQUES
============================================= -->
<section class="stats-section">
  <div id="dashboardStats" class="stats-grid"></div>
</section>


<!-- =============================================
     BANNIÈRE ÉVÉNEMENTS
============================================= -->
<section class="banner-section">
  <div id="eventsBanner"></div>
</section>


<!-- =============================================
     CONTENU PRINCIPAL
============================================= -->
<main class="dashboard-main">

  <!-- Panneau réservations -->
  <div id="reservationsDashboard" style="display:none;" class="reservations-dashboard">
    <div id="reservationsPanel"></div>
  </div>

  <!-- Panneau menus -->
  <div id="menusDashboard" style="display:grid;" class="menus-dashboard">

    <!-- Colonne gauche : Formulaire + Événements -->
    <aside class="dashboard-sidebar">

      <div class="sidebar-card">

        <div class="card-header">
          <h2>➕ Ajouter un plat</h2>
        </div>

        <div id="formError" class="error-msg" style="display:none;"></div>
        <div id="formSuccess" class="success-msg" style="display:none;"></div>

        <form id="serviceForm" class="dish-form">

          <div class="input-group">
            <label for="serviceName">Nom du plat</label>
            <input type="text" id="serviceName" placeholder="Ex: Salade César" maxlength="60" required>
          </div>

          <div class="input-group">
            <label for="servicePrice">Prix (€)</label>
            <input type="number" id="servicePrice" step="0.01" min="0.5" placeholder="10.50" required>
          </div>

          <div class="input-group">
            <label for="serviceCategory">Catégorie</label>
            <select id="serviceCategory" required>
              <option value="" disabled selected>Choisir</option>
              <option value="entree">🥗 Entrée</option>
              <option value="plat">🍽️ Plat</option>
              <option value="dessert">🍰 Dessert</option>
              <option value="boisson">🥤 Boisson</option>
              <option value="promo">🏷️ Promo</option>
            </select>
          </div>

          <div class="input-group">
            <label for="serviceMenuType">Type de menu</label>
            <select id="serviceMenuType" required>
              <option value="" disabled selected>Choisir</option>
              <option value="semaine">📅 Menu Semaine</option>
              <option value="weekend">🌅 Menu Week-end</option>
              <option value="evenement">🎉 Événement</option>
            </select>
          </div>

          <div class="input-group" id="eventSelectLabel" style="display:none;">
            <label for="eventSelect">Type d'événement</label>
            <select id="eventSelect"></select>
          </div>

          <div id="eventDateInfo" class="event-date-info" style="display:none;"></div>

          <div class="input-group" id="eventDateLabel" style="display:none;">
            <label for="eventDate">Date de l'événement</label>
            <input type="date" id="eventDate">
          </div>

          <div class="input-group" id="eventNameLabel" style="display:none;">
            <label for="eventName">Nom de l'événement</label>
            <input type="text" id="eventName" placeholder="Ex: Fête du restaurant" maxlength="40">
          </div>

          <div class="input-group">
            <label for="serviceMedia">Média (optionnel)</label>
            <label class="file-upload-label" for="serviceMedia">
              <span>📎 Choisir une image ou vidéo</span>
              <input type="file" id="serviceMedia" accept="image/*,video/*" class="file-input-hidden">
            </label>
            <div id="mediaPreview" class="media-preview"></div>
          </div>

          <button type="submit" id="submitDishBtn" class="btn-primary btn-full">
            Ajouter le plat
          </button>

        </form>

      </div>

      <div class="sidebar-card" id="eventsPanel"></div>

      <div class="sidebar-card rules-card">
        <details>
          <summary>ℹ️ Règles des événements</summary>
          <ul class="rules-list">
            <li>Maximum <strong>4 événements</strong> à l'avance.</li>
            <li>Un seul événement <strong>par jour</strong>.</li>
            <li>Le menu événement est <strong>prioritaire</strong> le jour J.</li>
            <li>Supprimer un événement supprime <strong>tous ses plats</strong>.</li>
          </ul>
        </details>
      </div>

    </aside>

    <!-- Colonne droite : Liste des plats -->
    <section class="dashboard-content">

      <div class="content-header">
        <h2>📋 Plats enregistrés</h2>
        <div class="search-bar-wrapper">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="dishSearch"
            class="search-input"
            placeholder="Rechercher un plat, catégorie, événement..."
            autocomplete="off"
          >
          <button id="searchClear" class="search-clear" style="display:none;">✕</button>
        </div>
        <div id="searchInfo" class="search-info" style="display:none;"></div>
      </div>

      <div id="menuDashboard">
        <p class="loading-text">Chargement...</p>
      </div>

    </section>

  </div><!-- fin #menusDashboard -->

</main>


<!-- =============================================
     SCRIPT UNIQUE
============================================= -->
<script type="module" src="./js/dashboardMain.js"></script>

</body>
</html>
